name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Run ruff check
        run: uvx ruff check src/

      - name: Run ruff format check
        run: uvx ruff format --check src/
